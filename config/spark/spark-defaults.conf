# ──────────────────────────────────────────────────────────────
# conf/spark-defaults.conf
# Configuración Optimizada para Spark ML + LLM + BigQuery
# ──────────────────────────────────────────────────────────────

# 1. Hive Metastore & SQL
spark.hadoop.hive.metastore.uris         thrift://hive-metastore:9083
spark.sql.catalogImplementation          hive
spark.sql.warehouse.dir                  /opt/spark/warehouse
spark.sql.shuffle.partitions             8
spark.default.parallelism                4

# 2. Soporte Apache Arrow (CRÍTICO para Pandas UDFs / LLM)
spark.sql.execution.arrow.pyspark.enabled          true
spark.sql.execution.arrow.pyspark.fallback.enabled true
spark.sql.execution.arrow.maxRecordsPerBatch       1000

# 3. Rendimiento y Memoria
spark.driver.memory                      1g
spark.executor.memory                    2g
spark.executor.cores                     2
spark.memory.fraction                    0.6
spark.memory.storageFraction             0.5

# 4. Serialización y Red (Optimizado para mover modelos/tensores)
spark.serializer                         org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max          512m
spark.rpc.message.maxSize                512

# 5. BigQuery & GCP
spark.jars.packages                      com.google.cloud.spark:spark-bigquery-with-dependencies_2.12:0.35.1
spark.hadoop.google.cloud.auth.service.account.enable true
# El path se manejará vía variable de entorno GOOGLE_APPLICATION_CREDENTIALS

# 6. UI y Registro de Eventos
spark.eventLog.enabled                   true
spark.eventLog.dir                       /opt/bitnami/spark/spark-events
spark.history.fs.logDirectory            /opt/bitnami/spark/spark-events
